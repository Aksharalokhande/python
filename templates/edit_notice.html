{% extends "base.html" %}
{% block content %}

<div class="card shadow-sm p-4">

    <h3>Edit Notice</h3>

    <form method="POST">

        <input
            type="text"
            name="notice"
            value="{{ notice.notice }}"
            class="form-control mb-3"
            required>
            <input
            type="date"
            name="date"
            value="{{ notice.date }}"
            class="form-control mb-3"
            required>

        <button class="btn btn-success">
            Update Notice
        </button>

    </form>

</div>

{% endblock %}
