
{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">➕ Add New Student</h4>
      </div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('add_student') }}">

          
          <div class="mb-3">
            <label class="form-label">👤 Student Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter name" required>

          </div>
          <div class="mb-3">
            <label class="form-label"> Roll Number</label>
            <input type="text" name="roll" class="form-control" placeholder="Enter Roll Number" required>
          </div>

      

          <div class="mb-3">
            <label class="form-label">🎓 Course</label>
            <input type="text" name="course" class="form-control" placeholder="Co, Ej, etc" required>
          </div>
          <div class="mb-3">
            <label class="form-label">📚 Subject</label>
            <input type="text" name="subject" class="form-control" placeholder="Enter Subject Name"required>
          </div>

          <div class="mb-3">
            <label class="form-label">📅 Attendance %</label>
            <input type="number" name="attendance" class="form-control" placeholder="0 to 100" required>
          </div>

          <div class="mb-3">
            <label class="form-label">📝 Marks</label>
            <input type="number" name="marks" class="form-control" placeholder="0 to 100" required>
          </div>

          <button type="submit" class="btn btn-success w-100">Submit</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
