
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Smart Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 70px; min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; }
    .footer { background: #0d1b2a; color: rgba(255, 255, 255, 0.504); }
  </style>
</head>
<body>
  <!-- Navbar - College color -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-secondary fixed-top shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">🎓 Smart Portal</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/records">Records</a>
        <a class="nav-link" href="/notices">Notices</a>
        <a class="nav-link" href="/add_students">Add_students</a>
      </div>
    </div>
  </nav>

  <main class="container my-4">
  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  
</main>

  <main class="container">
    {% block content %}
    {% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer text-center py-3 mt-5">
    <p class="mb-0">© 2026 Government Polytechnic Hingoli </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
